<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>头条英语角 · 词汇档案</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0d0d;
  --paper: #f5f0e8;
  --red: #c0392b;
  --gold: #b8860b;
  --mid: #5a5a5a;
  --lv-junior:  #7fb069;
  --lv-senior:  #3a86ff;
  --lv-cet4:    #fb8500;
  --lv-cet6:    #e63946;
  --lv-kaoyan:  #9d4edd;
  --lv-ielts:   #0d6efd;
  --lv-gre:     #333;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a1a;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--paper);
  border-bottom: 3px double var(--ink);
  padding: 20px 48px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  position: sticky;
  top: 0;
  z-index: 100;
}
.site-brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--red); letter-spacing: 5px; }
.site-sub { font-size: 10px; color: var(--mid); letter-spacing: 2px; }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: calc(100vh - 70px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--paper);
  border-right: 1px solid rgba(0,0,0,0.15);
  padding: 24px 0;
  position: sticky;
  top: 70px;
  height: calc(100vh - 70px);
  overflow-y: auto;
}
.sidebar-section { padding: 0 20px; margin-bottom: 20px; }
.sidebar-title {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--red);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--ink);
}

/* Search */
.search-box {
  width: 100%;
  background: rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.2);
  padding: 8px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ink);
  outline: none;
}
.search-box:focus { border-color: var(--red); }
.search-box::placeholder { color: var(--mid); }

/* Filter chips */
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-size: 9px;
  padding: 3px 10px;
  border: 1px solid rgba(0,0,0,0.2);
  cursor: pointer;
  color: var(--mid);
  background: transparent;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.chip:hover, .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.chip[data-lv="初中"].active  { background: var(--lv-junior); border-color: var(--lv-junior); }
.chip[data-lv="高中"].active  { background: var(--lv-senior); border-color: var(--lv-senior); }
.chip[data-lv="四级"].active  { background: var(--lv-cet4);   border-color: var(--lv-cet4); }
.chip[data-lv="六级"].active  { background: var(--lv-cet6);   border-color: var(--lv-cet6); }
.chip[data-lv="考研"].active  { background: var(--lv-kaoyan); border-color: var(--lv-kaoyan); }
.chip[data-lv="GRE"].active   { background: var(--lv-gre);    border-color: var(--lv-gre); }

/* Episode list */
.ep-list { padding: 0; }
.ep-item {
  padding: 12px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  cursor: pointer;
  transition: background 0.15s;
}
.ep-item:hover { background: rgba(192,57,43,0.06); }
.ep-item.active { background: rgba(192,57,43,0.1); border-left: 3px solid var(--red); }
.ep-date { font-size: 10px; color: var(--red); margin-bottom: 3px; }
.ep-title { font-family: 'Noto Serif SC', serif; font-size: 12px; color: var(--ink); line-height: 1.4; }
.ep-cat { font-size: 9px; color: var(--mid); margin-top: 3px; }

/* Stats bar in sidebar */
.stat-pills { display: flex; flex-direction: column; gap: 6px; }
.stat-pill { display: flex; justify-content: space-between; align-items: center; }
.stat-pill-label { font-size: 9px; color: var(--mid); }
.stat-pill-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--red); }

/* ── MAIN CONTENT ── */
.main {
  padding: 40px 48px 80px;
  background: #1a1a1a;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 0;
  color: var(--mid);
}
.empty-state .big { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: #333; }
.empty-state p { font-size: 11px; margin-top: 12px; letter-spacing: 2px; }

/* Episode detail card */
.ep-card {
  background: var(--paper);
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.ep-card-header {
  padding: 20px 28px 16px;
  border-bottom: 2px solid var(--ink);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.ep-card-date { font-size: 10px; color: var(--red); letter-spacing: 2px; margin-bottom: 6px; }
.ep-card-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.ep-card-cn { font-family: 'Noto Serif SC', serif; font-size: 12px; color: var(--mid); margin-top: 5px; }
.ep-card-source { font-size: 9px; color: var(--mid); margin-top: 6px; }
.ep-card-cat {
  font-size: 9px;
  padding: 4px 10px;
  background: var(--red);
  color: white;
  font-weight: 600;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 16px;
}

/* Vocab grid */
.card-section { padding: 20px 28px; border-bottom: 1px solid rgba(0,0,0,0.1); }
.card-section-title {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--red);
  margin-bottom: 14px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--ink);
}
.vocab-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.vocab-card {
  border: 1px solid rgba(0,0,0,0.12);
  padding: 12px 14px;
  transition: border-color 0.15s;
}
.vocab-card:hover { border-color: var(--red); }
.vc-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.vc-word { font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; color: var(--ink); }
.vc-ipa { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--mid); }
.vc-badges { display: flex; gap: 5px; margin-bottom: 6px; }
.badge-pos {
  font-size: 7px; letter-spacing: 1px;
  background: var(--ink); color: var(--paper);
  padding: 2px 6px; font-weight: 600;
}
.badge-lv { font-size: 7px; color: white; padding: 2px 6px; font-weight: 600; }
.vc-cn { font-family: 'Noto Serif SC', serif; font-size: 12px; color: var(--mid); margin-bottom: 5px; }
.vc-ex { font-family: 'Playfair Display', serif; font-size: 10px; font-style: italic; color: var(--mid); line-height: 1.5; }

/* Key sentence */
.key-sent {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-style: italic;
  color: var(--ink);
  line-height: 1.65;
  border-left: 4px solid var(--ink);
  padding-left: 18px;
  margin-bottom: 10px;
}
.key-sent-cn { font-family: 'Noto Serif SC', serif; font-size: 12px; color: var(--mid); line-height: 1.7; }

/* Writing frame */
.wf-box {
  border: 1.5px solid var(--gold);
  padding: 14px 18px;
  position: relative;
  margin-top: 14px;
}
.wf-box-label {
  position: absolute; top: -9px; left: 12px;
  background: var(--paper); padding: 0 8px;
  font-size: 8px; color: var(--gold); font-weight: 600; letter-spacing: 2px;
}
.wf-template-text {
  font-family: 'Playfair Display', serif;
  font-size: 13px; font-style: italic;
  color: var(--ink); line-height: 1.7; margin-bottom: 6px;
}
.wf-pattern { font-size: 10px; color: var(--mid); line-height: 1.6; margin-bottom: 8px; }
.wf-answer-toggle {
  font-size: 9px; color: var(--gold); font-weight: 600;
  letter-spacing: 1px; cursor: pointer; display: inline-block;
}
.wf-answer-body {
  display: none; margin-top: 8px; padding: 10px 14px;
  background: rgba(184,134,11,0.07); border-left: 3px solid var(--gold);
}
.wf-answer-body.open { display: block; }
.wf-answer-en { font-family: 'Playfair Display', serif; font-size: 12px; font-style: italic; color: var(--ink); line-height: 1.65; }
.wf-answer-cn { font-family: 'Noto Serif SC', serif; font-size: 11px; color: var(--mid); margin-top: 5px; line-height: 1.6; }

/* Takeaway */
.takeaway-en {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700;
  color: var(--ink); line-height: 1.35; margin-bottom: 8px;
}
.takeaway-cn { font-family: 'Noto Serif SC', serif; font-size: 13px; color: var(--mid); line-height: 1.8; }
.vocab-recap { font-size: 10px; color: var(--gold); font-weight: 600; margin-top: 10px; letter-spacing: 1px; }

/* All-vocab view */
.all-vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}
.all-vocab-card {
  background: var(--paper);
  padding: 12px 14px;
  border-left: 3px solid transparent;
  border-top: 1px solid rgba(0,0,0,0.08);
  cursor: default;
  transition: border-color 0.15s;
}
.all-vocab-card:hover { border-left-color: var(--red); }
.avc-meta { font-size: 9px; color: var(--mid); margin-top: 4px; }

/* View toggle */
.view-tabs { display: flex; gap: 0; margin-bottom: 28px; }
.view-tab {
  padding: 8px 20px;
  font-size: 10px; letter-spacing: 2px;
  background: #2a2a2a; color: #666;
  border: 1px solid #333;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  transition: all 0.15s;
}
.view-tab.active { background: var(--paper); color: var(--red); border-color: var(--paper); }
.view-tab:hover:not(.active) { color: #aaa; }

.view-panel { display: none; }
.view-panel.active { display: block; }

.section-heading {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; color: var(--paper);
  letter-spacing: 3px; margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid #333;
}
.no-results { font-size: 11px; color: #555; padding: 20px 0; }

/* Highlight search match */
mark { background: rgba(192,57,43,0.2); color: var(--red); font-style: normal; }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-brand">头条英语角 · 词汇档案</div>
    <div class="site-sub">TOUTIAO ENGLISH CORNER · EPISODE ARCHIVE</div>
  </div>
  <div style="font-size:10px; color:var(--mid); text-align:right;">

<div class="layout">

    <div class="sidebar-section">

        <button class="chip" data-lv="考研" style="--lv:var(--lv-kaoyan)">考研</button>
        <button class="chip" data-lv="GRE" style="--lv:var(--lv-gre)">GRE</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">统计</div>
      <div class="stat-pills">

          <span class="stat-pill-label">已收录期数</span>

      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">期数列表</div>
    </div>
    <div class="ep-list" id="ep-list"></div>

  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <div class="view-tabs">
      <button class="view-tab active" data-view="episodes">按期浏览</button>
      <button class="view-tab" data-view="allvocab">全部词汇</button>

    <!-- Episodes view -->
    <div class="view-panel active" id="view-episodes">
      <div class="section-heading" id="ep-heading">选择左侧期数查看详情</div>

          <div class="big">选</div>
          <p>从左侧选择一期开始查看</p>
        </div>
      </div>
    </div>

    <!-- All vocab view -->
    <div class="view-panel" id="view-allvocab" style="background:var(--paper); padding:28px 32px; min-height:600px;">
      <div class="section-heading" style="color:var(--ink); border-bottom-color:rgba(0,0,0,0.15);">全部词汇库 <span id="vocab-count" style="font-size:14px; color:var(--red);"></span></div>
      <div class="all-vocab-grid" id="all-vocab-grid"></div>
    </div>

  </main>
</div>

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let activeEp = null;
let activeLevel = 'ALL';
let searchQuery = '';
let activeView = 'episodes';

// ══════════════════════════════════════════
// LEVEL COLORS
// ══════════════════════════════════════════
const LV_COLORS = {
  '初中': '#7fb069', '高中': '#3a86ff',
  '四级': '#fb8500', '六级': '#e63946',
  '考研': '#9d4edd', '雅思托福': '#0d6efd', 'GRE': '#333'
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  renderSidebar();
  renderStats();
  renderAllVocab();
  if (EPISODES.length > 0) selectEp(EPISODES[0].ep);
}

// ══════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('ep-list');
  const sorted = [...EPISODES].sort((a, b) => b.ep.localeCompare(a.ep));
  list.innerHTML = sorted.map(ep => `
    <div class="ep-item ${activeEp === ep.ep ? 'active' : ''}" onclick="selectEp('${ep.ep}')">
      <div class="ep-date">EP. ${ep.ep}</div>
      <div class="ep-title">${ep.topic_cn}</div>
      <div class="ep-cat">${ep.category}</div>
    </div>
  `).join('');
}

function renderStats() {
  const allWords = EPISODES.flatMap(e => e.vocab);
  const cats = new Set(EPISODES.map(e => e.category)).size;
  document.getElementById('stat-eps').textContent = EPISODES.length;
  document.getElementById('stat-words').textContent = allWords.length;
  document.getElementById('stat-cats').textContent = cats;
  document.getElementById('header-stats').textContent =
    `${EPISODES.length} 期 · ${allWords.length} 词`;
}

// ══════════════════════════════════════════
// EPISODE DETAIL
// ══════════════════════════════════════════
function selectEp(epId) {
  activeEp = epId;
  renderSidebar();
  const ep = EPISODES.find(e => e.ep === epId);
  if (!ep) return;
  document.getElementById('ep-heading').textContent = `EP. ${ep.ep} · ${ep.topic_cn}`;

  const vocabHTML = ep.vocab.map(v => `
    <div class="vocab-card">
      <div class="vc-top">
        <span class="vc-word">${v.word}</span>
        <span class="vc-ipa">${v.ipa}</span>
      </div>
      <div class="vc-badges">
        <span class="badge-pos">${v.pos}</span>
        <span class="badge-lv" style="background:${LV_COLORS[v.level] || '#666'}">${v.level}</span>
      </div>
      <div class="vc-cn">${v.meaning_cn}</div>
      <div class="vc-ex">${v.example_en}</div>
    </div>
  `).join('');

  const chunksHTML = ep.key_sentence.chunks.map(c => `
    <div style="border:1px solid rgba(0,0,0,0.12); padding:10px 12px; margin-bottom:8px;">
      <div style="font-family:'Playfair Display',serif; font-size:13px; font-style:italic; color:var(--ink); margin-bottom:4px;">${c.phrase}</div>
      <div style="font-family:'Noto Serif SC',serif; font-size:11px; color:var(--mid);">${c.cn}</div>
    </div>
  `).join('');

  const vocabRecap = ep.vocab.map(v => v.word).join(' · ');

  document.getElementById('ep-detail').innerHTML = `
    <div class="ep-card">
      <div class="ep-card-header">
        <div>
          <div class="ep-card-date">EP. ${ep.ep} · ${ep.source}</div>
          <div class="ep-card-title">${ep.headline_en}</div>
          <div class="ep-card-cn">${ep.headline_cn}</div>
          <div class="ep-card-source">${ep.context_cn}</div>
        </div>
        <div class="ep-card-cat">${ep.category}</div>
      </div>

      <div class="card-section">
        <div class="card-section-title">核心词汇 KEY VOCABULARY</div>
        <div class="vocab-grid">${vocabHTML}</div>
      </div>

      <div class="card-section">
        <div class="card-section-title">句子精讲 SENTENCE STUDY</div>
        <div class="key-sent">${ep.key_sentence.en}</div>
        <div class="key-sent-cn">${ep.key_sentence.cn}</div>
        <div style="margin-top:14px;">${chunksHTML}</div>
        <div class="wf-box">
          <div class="wf-box-label">✏️ WRITING FRAME · 仿写框架</div>
          <div class="wf-template-text">${ep.writing_frame.template}</div>
          <div class="wf-pattern">💡 ${ep.writing_frame.pattern_cn}</div>
          <span class="wf-answer-toggle" onclick="toggleAnswer(this)">▶ 查看参考答案</span>
          <div class="wf-answer-body">
            <div class="wf-answer-en">${ep.writing_frame.answer_en}</div>
            <div class="wf-answer-cn">${ep.writing_frame.answer_cn}</div>
          </div>
        </div>
      </div>

      <div class="card-section">
        <div class="card-section-title">今日总结 TAKEAWAY</div>
        <div class="takeaway-en">${ep.takeaway.en}</div>
        <div class="takeaway-cn">${ep.takeaway.cn}</div>
        <div class="vocab-recap">${vocabRecap}</div>
      </div>

      ${ep.china_relevance ? `
      <div class="card-section" style="border-bottom:none;">
        <div class="card-section-title">与中国的关联 CHINA RELEVANCE</div>
        <div style="font-family:'Noto Serif SC',serif; font-size:13px; color:var(--mid); line-height:1.9;">${ep.china_relevance}</div>
      </div>` : ''}
    </div>
  `;
}

function toggleAnswer(btn) {
  const body = btn.nextElementSibling;
  const open = body.classList.toggle('open');
  btn.textContent = open ? '▼ 收起参考答案' : '▶ 查看参考答案';
}

// ══════════════════════════════════════════
// ALL VOCAB VIEW
// ══════════════════════════════════════════
function renderAllVocab() {
  let words = EPISODES.flatMap(ep =>
    ep.vocab.map(v => ({ ...v, ep: ep.ep, topic_cn: ep.topic_cn }))
  );

  if (activeLevel !== 'ALL') words = words.filter(v => v.level === activeLevel);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    words = words.filter(v =>
      v.word.toLowerCase().includes(q) ||
      v.meaning_cn.includes(q) ||
      v.example_en.toLowerCase().includes(q)
    );
  }

  const grid = document.getElementById('all-vocab-grid');
  const countEl = document.getElementById('vocab-count');
  if (words.length === 0) {
    grid.innerHTML = '<div class="no-results">没有找到匹配词汇</div>';
    if (countEl) countEl.textContent = '';
    return;
  }
  if (countEl) countEl.textContent = `· ${words.length} 词`;

  const hl = (text) => {
    if (!searchQuery) return text;
    const re = new RegExp(`(${searchQuery})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  };

  grid.innerHTML = words.map(v => `
    <div class="all-vocab-card">
      <div class="vc-top">
        <span class="vc-word" style="font-size:16px;">${hl(v.word)}</span>
        <span class="vc-ipa">${v.ipa}</span>
      </div>
      <div class="vc-badges" style="margin:4px 0;">
        <span class="badge-pos">${v.pos}</span>
        <span class="badge-lv" style="background:${LV_COLORS[v.level]||'#666'}">${v.level}</span>
      </div>
      <div class="vc-cn" style="font-size:12px;">${hl(v.meaning_cn)}</div>
      <div class="avc-meta">EP. ${v.ep} · ${v.topic_cn}</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeLevel = chip.dataset.lv;
    renderAllVocab();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderAllVocab();
  if (searchQuery && activeView !== 'allvocab') switchView('allvocab');
});

document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => switchView(tab.dataset.view));
});

function switchView(view) {
  activeView = view;
  document.querySelectorAll('.view-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === view)
  );
  document.querySelectorAll('.view-panel').forEach(p =>
    p.classList.toggle('active', p.id === `view-${view}`)
  );
  if (view === 'allvocab') renderAllVocab();
}

init();
</script>
